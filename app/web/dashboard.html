<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aggressive Trading Bot — Research Dashboard</title>
  <style>
    :root {
      --bg: #ffffff; --panel: #f6f7f9; --border: #e3e6ea; --text: #1a1d21;
      --muted: #6b7280; --accent: #2563eb; --green: #067d54; --red: #c0392b;
      --chip: #eef2ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1216; --panel: #171b21; --border: #262c34; --text: #e6e9ee;
        --muted: #8b95a3; --accent: #5b8cff; --green: #34d399; --red: #f87171;
        --chip: #1e2636;
      }
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: var(--bg); color: var(--text); }
    header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex;
             align-items: center; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .muted { color: var(--muted); }
    .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: var(--chip); }
    .warn { color: var(--red); }
    main { padding: 20px 24px; width: 100%; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    input[type=text] { background: var(--panel); border: 1px solid var(--border); color: var(--text);
                       padding: 7px 10px; border-radius: 8px; min-width: 240px; }
    button { background: var(--accent); color: #fff; border: 0; padding: 7px 14px; border-radius: 8px;
             cursor: pointer; font-size: 13px; }
    button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
    button:disabled { opacity: .5; cursor: default; }
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .tabs button { background: transparent; color: var(--muted); border: 1px solid transparent; }
    .tabs button.active { color: var(--text); border-color: var(--border); background: var(--panel); }
    .overflow { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    tr:last-child td { border-bottom: 0; }
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: var(--panel); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .pos { color: var(--green); } .neg { color: var(--red); }
    .pill { font-size: 11px; padding: 1px 7px; border-radius: 999px; background: var(--chip); }
    .rejected { opacity: .55; }
    tr.bucket td { background: var(--chip); font-weight: 600; font-size: 12px;
      letter-spacing: .3px; padding: 5px 8px; color: var(--muted); }
    td.rank { color: var(--muted); font-variant-numeric: tabular-nums; }
    .detail { background: var(--panel); }
    .detail td { white-space: normal; }
    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 2px 14px; }
    .kv div:nth-child(odd) { color: var(--muted); }
    .row-actions { display: flex; gap: 6px; }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    .err { color: var(--red); margin: 8px 0; }
    code { background: var(--chip); padding: 1px 5px; border-radius: 5px; }
    .sections { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .sections button { background: transparent; color: var(--muted); border: 1px solid var(--border);
                       font-weight: 600; }
    .sections button.active { color: #fff; background: var(--accent); border-color: var(--accent); }
    .banner { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
              background: var(--panel); }
    .banner h2 { margin: 0 0 4px; font-size: 20px; }
    .banner .sub { color: var(--muted); font-size: 13px; }
    .regime-ok { border-left: 4px solid var(--green); }
    .regime-warn { border-left: 4px solid #d97706; }
    .regime-stop { border-left: 4px solid var(--red); }
    .factors { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .factor { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: var(--chip); }
    .factor.against { background: transparent; border: 1px dashed var(--border); color: var(--muted); }
    /* minmax(0,1fr) lets columns shrink below content width so inner tables
       scroll (via .card overflow) instead of overflowing/clipping the page. */
    .grid2 { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; }
    @media (max-width: 820px) { .grid2 { grid-template-columns: 1fr; } }
    /* Responsive auto-flow: fit as many >=320px columns as the window allows. */
    .autogrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; overflow-x: auto; }
    .card h3 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
    .countdown { font-size: 22px; font-variant-numeric: tabular-nums; }
    .proxy-note { font-size: 11px; color: var(--muted); font-style: italic; }
    .search { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .search input { min-width: 180px; text-transform: uppercase; }
    .report-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 18px; }
    .report-head .price { font-size: 26px; font-weight: 600; }
    .stat { display: flex; flex-direction: column; }
    .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .stat .v { font-size: 15px; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <header>
    <h1>Aggressive Trading Bot <span class="muted">— Research &amp; Decision Support</span></h1>
    <span id="cfg" class="muted"></span>
    <span class="search">
      <input id="symSearch" type="text" placeholder="Search a ticker… (e.g. NVDA)" maxlength="8" />
      <button id="symSearchBtn">Search</button>
    </span>
  </header>
  <main>
    <div class="sections">
      <button data-section="core" class="active">Core Research</button>
      <button data-section="short">Short-Duration Trading</button>
    </div>
    <div id="coreControls" class="controls">
      <input id="symbols" type="text" placeholder="Symbols (optional, comma-separated) — blank = default universe" />
      <label class="muted"><input id="actionable" type="checkbox" checked /> actionable only</label>
      <button id="scan">Run scan</button>
      <span id="scanInfo" class="muted"></span>
    </div>
    <div id="err" class="err"></div>
    <div class="tabs" id="coreTabs">
      <button data-tab="candidates" class="active">Candidates</button>
      <button data-tab="positions">Positions</button>
      <button data-tab="proposals">Proposals</button>
      <button data-tab="paper">Paper trades</button>
      <button data-tab="calibration">Calibration</button>
      <button data-tab="ops">Ops</button>
    </div>
    <div class="tabs" id="sdTabs" hidden>
      <button data-sdtab="command" class="active">0DTE Command Center</button>
      <button data-sdtab="scanner">1–5DTE Scanner</button>
      <button data-sdtab="candidates">Trade Candidates</button>
      <button data-sdtab="positions">Open Positions</button>
      <button data-sdtab="news">News &amp; Catalysts</button>
      <button data-sdtab="events">Event Calendar</button>
      <button data-sdtab="performance">Performance</button>
      <button data-sdtab="config">Configuration</button>
    </div>
    <div id="view" class="overflow"><div class="empty">Run a scan to see ranked candidates.</div></div>
  </main>

  <script>
    const $ = (s) => document.querySelector(s);
    const api = async (m, url, body) => {
      const r = await fetch(url, {
        method: m, headers: body ? { "content-type": "application/json" } : {},
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.status + " " + url);
      return r.json();
    };
    const showErr = (e) => { $("#err").textContent = e ? ("Error: " + e.message) : ""; };
    const fmt = (v, d = 2) => (v === null || v === undefined) ? "—" : Number(v).toFixed(d);
    const pct = (v) => (v === null || v === undefined) ? "—" : (Number(v) * 100).toFixed(0) + "%";
    const cls = (v) => v > 0 ? "pos" : v < 0 ? "neg" : "";
    // Broker-aligned play names (match Robinhood's order-ticket labels).
    const STRAT_LABEL = {
      long_call: "Long Call", long_put: "Long Put",
      bull_call_spread: "Call Debit Spread", bear_put_spread: "Put Debit Spread",
      bull_put_spread: "Put Credit Spread", bear_call_spread: "Call Credit Spread",
      long_straddle: "Long Straddle", long_strangle: "Long Strangle", iron_condor: "Iron Condor",
    };
    const stratLabel = (s) => STRAT_LABEL[s] || (s || "—");

    let state = { scanId: null, candidates: [], tab: "candidates", expandedPos: new Set(),
                  section: "core", sdTab: "command", sdDetail: null, search: null };

    // Live auto-refresh: poll while a live view is open (Ops/Positions, or the
    // Short-Duration command center / positions).
    let opsTimer = null;
    const LIVE_TABS = ["ops", "positions"];
    const SD_LIVE_TABS = ["command", "positions"];
    function isLive() {
      return state.section === "short"
        ? SD_LIVE_TABS.includes(state.sdTab)
        : LIVE_TABS.includes(state.tab);
    }
    function manageOpsRefresh() {
      if (opsTimer) { clearInterval(opsTimer); opsTimer = null; }
      if (isLive()) opsTimer = setInterval(() => { if (isLive()) render(); }, 5000);
    }

    async function loadConfig() {
      try {
        const c = await api("GET", "/config/runtime");
        const rp = c.risk_policy;
        $("#cfg").innerHTML =
          `<span class="badge">mode: ${c.trading_mode}</span> ` +
          `<span class="badge ${c.automation_armed ? "warn" : ""}">automation: ${c.automation_armed ? "ARMED" : "off"}</span> ` +
          `<span class="badge">equity $${rp.account_equity_usd}</span> ` +
          `<span class="badge">max/trade $${rp.max_trade_risk_usd}</span>`;
      } catch (e) { /* non-fatal */ }
    }

    async function runScan() {
      showErr(null);
      $("#scan").disabled = true; $("#scanInfo").textContent = "scanning…";
      try {
        const syms = $("#symbols").value.split(",").map(s => s.trim().toUpperCase()).filter(Boolean);
        const q = $("#actionable").checked ? "?actionable_only=true" : "";
        const res = await api("POST", "/scans" + q, { symbols: syms.length ? syms : null });
        state.scanId = res.scan_id;
        state.candidates = res.candidates;
        $("#scanInfo").textContent = `${res.actionable} actionable of ${res.count} — scan ${res.scan_id || "—"}`;
        render();
      } catch (e) { showErr(e); }
      finally { $("#scan").disabled = false; }
    }

    function directionPill(d) { return `<span class="pill">${d}</span>`; }

    function candidateRow(c) {
      const p = c.trade_plan, a = p && p.analytics;
      const risk = p ? `$${fmt(p.risk.max_loss_usd, 0)}` : "—";
      const rr = p ? pct(p.risk.account_risk_pct) : "";
      const pop = a && a.probability_of_profit != null ? pct(a.probability_of_profit) : "—";
      const be = a && a.breakevens && a.breakevens.length ? a.breakevens.join(" / ") : "—";
      const strat = p ? p.strategy : (c.reject_reasons || []).join(", ") || "—";
      return `<tr class="clickable ${c.status === "rejected" ? "rejected" : ""}" data-sym="${c.symbol}">
        <td class="num">${fmt(c.composite_score)}</td>
        <td><strong>${c.symbol}</strong></td>
        <td>${directionPill(c.direction)}</td>
        <td>${strat}</td>
        <td class="num">${risk} <span class="muted">${rr}</span></td>
        <td class="num">${pop}</td>
        <td class="num">${be}</td>
        <td>${c.status}</td>
        <td class="row-actions">${p ? `<button class="ghost" data-act="propose" data-sym="${c.symbol}">Propose</button>
             <button class="ghost" data-act="paper" data-sym="${c.symbol}">Paper</button>` : ""}</td>
      </tr>`;
    }

    function orderTicketHtml(c) {
      const p = c.trade_plan;
      if (!p || !p.legs || !p.legs.length) return "";
      const legRows = p.legs.map(l => {
        const buy = (l.action || "").indexOf("buy") === 0;
        const typ = l.option_type === "call" ? "C" : "P";
        return `<tr><td>${buy ? "BUY" : "SELL"}</td><td><strong>${l.strike}${typ}</strong></td>
          <td>${l.expiration}</td><td class="num">$${fmt(l.entry_price)}</td></tr>`;
      }).join("");
      let width = "";
      if (p.legs.length === 2) width = ` · width $${fmt(Math.abs(p.legs[0].strike - p.legs[1].strike), 0)}`;
      const net = p.exit_plan ? p.exit_plan.entry_net_per_share : (p.net_debit / 100);
      const kind = net < 0 ? "credit" : "debit";
      const maxLoss = p.risk ? `$${fmt(p.risk.max_loss_usd, 0)}` : "—";
      const maxProfit = (p.risk && p.risk.max_profit_usd != null) ? `$${fmt(p.risk.max_profit_usd, 0)}` : "uncapped";
      return `<div style="margin-top:10px"><b>Order ticket</b>
        <span class="muted">(${stratLabel(p.strategy)} x${p.contracts}${width})</span>
        <table style="margin-top:4px"><thead><tr><th>Side</th><th>Contract</th><th>Expiration</th><th class="num">Mid</th></tr></thead>
        <tbody>${legRows}</tbody></table>
        <div class="muted" style="margin-top:4px">Enter as ONE spread order — net <b>${kind} ~$${fmt(Math.abs(net))}/share</b>,
        ${p.contracts} lot · max loss ${maxLoss} · max profit ${maxProfit}. Prices are mids; use the live bid/ask at order time.</div></div>`;
    }

    function exitPlanHtml(c) {
      const ep = c.trade_plan && c.trade_plan.exit_plan;
      if (!ep) return "";
      const act = ep.action === "buy_to_close" ? "Buy-to-close" : "Sell-to-close";
      const rows = ep.levels.map(l => {
        const price = l.net_price == null ? "—" : ("$" + fmt(l.net_price));
        const pnl = l.pnl_usd == null ? "" : `<span class="${l.pnl_usd >= 0 ? "pos" : "neg"}">${l.pnl_usd >= 0 ? "+" : ""}$${fmt(l.pnl_usd, 0)}</span>`;
        return `<tr><td>${l.label}</td><td class="num">${price}</td><td class="num">${pnl}</td><td class="muted">${l.note}</td></tr>`;
      }).join("");
      return `<div style="margin-top:10px"><b>Exit plan</b> <span class="muted">(${act}, ${ep.contracts} lot; time stop ${ep.time_stop_dte} DTE)</span>
        <table style="margin-top:4px"><thead><tr><th>Trigger</th><th class="num">Net price</th><th class="num">P&L</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`;
    }

    function detailRow(c) {
      const t = c.thesis;
      const sig = (c.signals || []).map(s => `${s.name} ${fmt(s.score)}`).join(" · ");
      return `<tr class="detail"><td colspan="9"><div class="kv">
        <div>Why now</div><div>${t.why_now}</div>
        <div>Flow meaningful</div><div>${t.flow_meaningful}</div>
        <div>Price confirms</div><div>${t.price_confirms}</div>
        <div>Catalyst</div><div>${t.has_catalyst ? (t.catalyst_note || "yes") : "none"}</div>
        <div>IV favorable</div><div>${t.iv_favorable} — ${t.iv_note || ""}</div>
        <div>Invalidation</div><div>${t.invalidation}</div>
        <div>Signals</div><div>${sig}</div>
      </div>${orderTicketHtml(c)}${exitPlanHtml(c)}</td></tr>`;
    }

    function renderCandidates() {
      if (!state.candidates.length)
        return `<div class="empty">No candidates. Run a scan.</div>`;
      const rows = state.candidates.map(c =>
        candidateRow(c) + `<tr class="detail" hidden id="d-${c.symbol}"></tr>`).join("");
      return `<table><thead><tr>
        <th class="num">Score</th><th>Sym</th><th>Dir</th><th>Structure / reject</th>
        <th class="num">Risk</th><th class="num">POP</th><th class="num">Breakeven</th>
        <th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    const PROP_STATUS = {
      draft: "muted", pending_approval: "warn", approved: "pos",
      rejected: "neg", expired: "muted", filled: "pos", cancelled: "muted",
    };
    async function renderProposals() {
      const ps = await api("GET", "/proposals");
      const intro = `<div class="banner"><h2>Proposals — the human-approval gate</h2>
        <div class="sub">A proposal is a fully-specified order ticket the scanner built from a candidate,
        held here for <b>your</b> review. Nothing is sent to a broker automatically. The flow is:
        <b>Candidate → Propose → Approve → Execute</b>. <b>Execute is double-gated</b> — it stays denied by
        default (research mode) and only ever routes an order when live trading is explicitly armed, which it is not.</div></div>`;
      if (!ps.length)
        return intro + `<div class="empty" style="margin-top:10px">No proposals yet. Open a candidate and press <b>Propose</b> to draft one.</div>`;
      const cards = ps.map(p => {
        const pl = p.trade_plan || {};
        const cls = PROP_STATUS[p.status] || "muted";
        const risk = pl.risk ? `$${fmt(pl.risk.max_loss_usd, 0)}` : "—";
        const rr = pl.risk && pl.risk.reward_to_risk != null ? ` · R:R ${pl.risk.reward_to_risk} : 1` : "";
        const expires = p.expires_at ? new Date(p.expires_at).toLocaleString() : "—";
        // Actions reflect the lifecycle: approve/reject while pending, execute once approved.
        const pending = p.status === "pending_approval" || p.status === "draft";
        const acts = p.status === "approved"
          ? `<button data-p="${p.id}" data-act="execute">Execute (guarded)</button>
             <button class="ghost" data-p="${p.id}" data-act="reject">Reject</button>`
          : pending
          ? `<button data-p="${p.id}" data-act="approve">Approve</button>
             <button class="ghost" data-p="${p.id}" data-act="reject">Reject</button>`
          : `<span class="muted">no actions (${p.status})</span>`;
        return `<div class="card" style="margin-top:10px">
          <div class="banner" style="margin:0"><h3 style="margin:0">${p.symbol}
            <span class="muted" style="font-size:13px">${stratLabel(pl.strategy)} · ${pl.direction || ""} · ${pl.contracts || 1} lot</span>
            <span class="badge ${cls}" style="margin-left:6px">${p.status.replace(/_/g, " ")}</span></h3>
            <div class="sub">max risk <b>${risk}</b>${rr} · expires ${expires}
              ${p.reject_note ? `· <span class="neg">rejected: ${p.reject_note}</span>` : ""}</div></div>
          ${p.thesis_summary ? `<div style="margin-top:8px"><b>Thesis:</b> ${p.thesis_summary}</div>` : ""}
          ${pl.rationale ? `<div class="muted" style="margin-top:4px">${pl.rationale}</div>` : ""}
          ${orderTicketHtml(p)}
          ${exitPlanHtml(p)}
          <div class="row-actions" style="margin-top:10px">${acts}</div>
        </div>`;
      }).join("");
      return intro + cards;
    }

    async function renderPaper() {
      const ts = await api("GET", "/paper");
      if (!ts.length) return `<div class="empty">No paper trades yet.</div>`;
      const rows = ts.map(t => `<tr>
        <td><strong>${t.symbol}</strong></td><td>${stratLabel(t.trade_plan.strategy)}</td>
        <td class="num">${fmt(t.entry_fill)}</td>
        <td class="num ${cls(t.mfe_usd)}">${fmt(t.mfe_usd, 0)}</td>
        <td class="num ${cls(t.mae_usd)}">${fmt(t.mae_usd, 0)}</td>
        <td>${t.status}</td>
        <td class="num ${cls(t.realized_pnl_usd)}">${t.realized_pnl_usd == null ? "—" : fmt(t.realized_pnl_usd, 0)}</td>
      </tr>`).join("");
      return `<table><thead><tr><th>Sym</th><th>Structure</th><th class="num">Entry</th>
        <th class="num">MFE</th><th class="num">MAE</th><th>Status</th><th class="num">P&amp;L</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }

    const gapTxt = (g) => g == null ? "—" : (g >= 0 ? "+" : "") + (Number(g) * 100).toFixed(0) + "pt";
    const gapCls = (g) => g == null ? "" : (g >= 0 ? "pos" : "neg");

    async function renderCalibration() {
      const sc = await api("GET", "/outcomes/calibration");
      const badges =
        `<div style="margin-bottom:10px">
          <span class="badge">decisions ${sc.n_decisions}</span>
          <span class="badge">resolved ${sc.n_resolved}</span>
          <span class="badge">decisive ${sc.n_decisive}</span>
          <span class="badge">win rate ${pct(sc.win_rate)}</span>
          <span class="badge">direction ${pct(sc.direction_accuracy)}</span>
          <span class="badge">avg POP ${pct(sc.avg_predicted_pop)}</span>
          <span class="badge ${gapCls(sc.calibration_gap)}">calib gap ${gapTxt(sc.calibration_gap)}</span>
          <span class="badge">Brier ${fmt(sc.brier_score)}</span>
        </div>`;
      const resolveBtn = `<button class="ghost" data-act="resolve">Resolve matured decisions</button>`;
      if (!sc.n_resolved) {
        return badges + `<div class="empty">No resolved decisions yet. Scans warehouse every
          actionable decision automatically; once they've matured, ${resolveBtn} scores them
          against current prices.</div>`;
      }
      const popRows = (sc.pop_buckets || []).map(b => `<tr>
        <td>${b.label}</td><td class="num">${b.n}</td>
        <td class="num">${pct(b.avg_predicted_pop)}</td>
        <td class="num">${pct(b.realized_win_rate)}</td>
        <td class="num ${gapCls(b.calibration_gap)}">${gapTxt(b.calibration_gap)}</td></tr>`).join("");
      const stratRows = (sc.by_strategy || []).map(g => `<tr>
        <td>${g.key}</td><td class="num">${g.n}</td>
        <td class="num">${pct(g.win_rate)}</td><td class="num">${fmt(g.avg_score)}</td></tr>`).join("");
      const dirRows = (sc.by_direction || []).map(g => `<tr>
        <td>${g.key}</td><td class="num">${g.n}</td><td class="num">${pct(g.win_rate)}</td></tr>`).join("");
      return badges +
        `<div style="margin-bottom:10px">${resolveBtn} <span class="muted">${sc.note || ""}</span></div>
         <b>POP calibration</b> <span class="muted">— predicted vs realized win rate by bucket</span>
         <table style="margin:4px 0 16px"><thead><tr><th>POP bucket</th><th class="num">n</th>
           <th class="num">Predicted</th><th class="num">Realized</th><th class="num">Gap</th></tr></thead>
           <tbody>${popRows || `<tr><td colspan="5" class="muted">—</td></tr>`}</tbody></table>
         <b>By strategy</b>
         <table style="margin:4px 0 16px"><thead><tr><th>Strategy</th><th class="num">n</th>
           <th class="num">Win rate</th><th class="num">Avg score</th></tr></thead>
           <tbody>${stratRows}</tbody></table>
         <b>By direction</b>
         <table style="margin-top:4px"><thead><tr><th>Direction</th><th class="num">n</th>
           <th class="num">Win rate</th></tr></thead><tbody>${dirRows}</tbody></table>`;
    }

    function posBadge(a) {
      const map = { stop: "neg", take_profit: "pos", time_stop: "warn", unmarked: "warn", hold: "" };
      const label = { stop: "STOP — close", take_profit: "TAKE PROFIT", time_stop: "TIME STOP",
                      unmarked: "UNMARKED", hold: "hold" };
      return `<span class="badge ${map[a] || ''}">${label[a] || a}</span>`;
    }

    function positionDetail(p) {
      const warn = (p.warnings || []).length
        ? `<div class="err" style="margin:6px 0">${p.warnings.join(" · ")}</div>` : "";
      const legRows = (p.legs || []).map(l =>
        `<tr><td>${l.side}</td><td><strong>${l.contract}</strong></td><td>${l.expiration}</td></tr>`).join("");
      const closeTicket = legRows ? `<b>Close ticket</b> <span class="muted">(reverse the spread as ONE order)</span>
        <table style="margin:4px 0 12px"><thead><tr><th>Side</th><th>Contract</th><th>Expiration</th></tr></thead>
        <tbody>${legRows}</tbody></table>` : "";
      const exRows = (p.exit_levels || []).map(l => {
        const price = l.net_price == null ? "—" : ("$" + fmt(l.net_price));
        const pnl = l.pnl_usd == null ? "" : `<span class="${l.pnl_usd >= 0 ? "pos" : "neg"}">${l.pnl_usd >= 0 ? "+" : ""}$${fmt(l.pnl_usd, 0)}</span>`;
        return `<tr><td>${l.label}</td><td class="num">${price}</td><td class="num">${pnl}</td><td class="muted">${l.note}</td></tr>`;
      }).join("");
      const exitPlan = exRows ? `<b>Exit plan</b> <span class="muted">(your standing reminder — close at these nets)</span>
        <table style="margin:4px 0 12px"><thead><tr><th>Trigger</th><th class="num">Net</th><th class="num">P&L</th><th>Note</th></tr></thead>
        <tbody>${exRows}</tbody></table>` : "";
      const be = (p.breakevens || []).length ? p.breakevens.join(" / ") : "—";
      const beDist = p.breakeven_distance_pct == null ? "" :
        ` <span class="muted">(needs ${p.breakeven_distance_pct >= 0 ? "+" : ""}${(p.breakeven_distance_pct * 100).toFixed(1)}% ${p.underlying_price != null ? "from $" + fmt(p.underlying_price) : ""})</span>`;
      const greeks = (p.net_delta == null && p.net_theta == null) ? "—" :
        `${p.net_delta == null ? "—" : (p.net_delta >= 0 ? "+" : "") + fmt(p.net_delta, 0) + "Δ"} · ${p.net_theta == null ? "—" : (p.net_theta >= 0 ? "+" : "") + "$" + fmt(p.net_theta, 0) + "/day θ"}`;
      const earn = p.earnings_date
        ? `<div>Earnings</div><div class="${p.earnings_before_expiry ? "neg" : ""}">${p.earnings_date}${p.earnings_before_expiry ? " ⚠ before expiry" : " (after expiry)"}</div>`
        : "";
      const summary = `<div class="kv">
        <div>Entry (net)</div><div>$${fmt(p.entry_net)}${p.current_net != null ? ` → now $${fmt(p.current_net)}` : ""}</div>
        <div>Max loss / profit</div><div>$${fmt(p.max_loss_usd, 0)} / ${p.max_profit_usd == null ? "uncapped" : "$" + fmt(p.max_profit_usd, 0)}</div>
        <div>Breakeven</div><div>${be}${beDist}</div>
        <div>Net greeks</div><div>${greeks}</div>
        <div>DTE / time stop</div><div>${p.dte == null ? "—" : p.dte} / ${p.time_stop_dte == null ? "—" : p.time_stop_dte} DTE</div>
        ${earn}
      </div>`;
      const open = state.expandedPos.has(p.symbol);
      return `<tr class="detail" id="pd-${p.symbol}"${open ? "" : " hidden"}><td colspan="8">
        ${warn}${summary}<div style="margin-top:8px"></div>${closeTicket}${exitPlan}</td></tr>`;
    }

    async function renderPositions() {
      const ps = await api("GET", "/positions");
      const toolbar = `<div style="margin-bottom:10px">
        <span class="badge" style="color:#3fb950">● live · ${new Date().toLocaleTimeString()}</span>
        <button class="ghost" data-act="pos-refresh">Refresh</button>
        <button class="ghost" data-act="pos-sync">Sync from Robinhood</button>
        <span class="muted">Click a row for its exit plan + close ticket. Marks re-fetch live every 5s.</span></div>`;
      if (!ps.length) return toolbar + `<div class="empty">No open positions tracked. Import via POST /paper/import, or Sync from Robinhood.</div>`;
      const rows = ps.map(p => `<tr class="pos-clickable" data-sym="${p.symbol}">
        <td><strong>${p.symbol}</strong></td>
        <td>${stratLabel(p.strategy)} <span class="muted">x${p.contracts}</span></td>
        <td class="num">${fmt(p.entry_net)}</td>
        <td class="num">${p.current_net == null ? "—" : fmt(p.current_net)}</td>
        <td class="num ${cls(p.pnl_usd)}">${p.pnl_usd == null ? "—" : (p.pnl_usd >= 0 ? "+" : "") + "$" + fmt(p.pnl_usd, 0)}</td>
        <td class="num ${cls(p.pnl_pct)}">${p.pnl_pct == null ? "—" : (p.pnl_pct >= 0 ? "+" : "") + (p.pnl_pct * 100).toFixed(0) + "%"}</td>
        <td class="num">${p.dte == null ? "—" : p.dte}</td>
        <td>${posBadge(p.action)}</td>
      </tr>` + positionDetail(p)).join("");
      return toolbar + `<table><thead><tr><th>Sym</th><th>Structure</th><th class="num">Entry</th><th class="num">Now</th>
        <th class="num">P&amp;L</th><th class="num">%</th><th class="num">DTE</th><th>Action</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }

    async function renderOps() {
      const m = await api("GET", "/metrics");
      const c = m.cache || {}, rl = m.rate_limit || {}, ev = m.events || {}, t = m.tiers || {};
      const reg = m.registry || { counters: {}, gauges: {}, timings: {} };

      const badges =
        `<div style="margin-bottom:12px">
          <span class="badge" style="color:#3fb950">● live · ${new Date().toLocaleTimeString()}</span>
          <span class="badge">cache ${c.hit_rate == null ? "—" : (c.hit_rate * 100).toFixed(0) + "%"} hit</span>
          <span class="badge">cache hits ${c.hits ?? 0}/${(c.hits ?? 0) + (c.misses ?? 0)}</span>
          <span class="badge">rate-limit ${rl.enabled ? "on" : "off"}</span>
          <span class="badge">events ${ev.published ?? 0}</span>
          <span class="badge ${ev.errors ? "warn" : ""}">event errors ${ev.errors ?? 0}</span>
        </div>`;

      const tierRow = `<b>Tier membership</b>
        <table style="margin:4px 0 16px"><thead><tr><th>Broad</th><th>Watchlist</th><th>Candidates</th><th>Positions</th></tr></thead>
        <tbody><tr><td class="num">${t.broad ?? 0}</td><td class="num">${t.watchlist ?? 0}</td>
        <td class="num">${t.candidates ?? 0}</td><td class="num">${t.positions ?? 0}</td></tr></tbody></table>`;

      // Provider metrics assembled from registry counters/timings.
      const provs = {};
      for (const [k, v] of Object.entries(reg.counters || {})) {
        const mm = k.match(/^provider\.([^.]+)\.(requests|errors|cache_hits)$/);
        if (mm) { (provs[mm[1]] ??= {}); provs[mm[1]][mm[2]] = v; }
      }
      for (const [k, v] of Object.entries(reg.timings || {})) {
        const mm = k.match(/^provider\.([^.]+)\.latency_ms$/);
        if (mm) { (provs[mm[1]] ??= {}); provs[mm[1]].latency = v; }
      }
      const provRows = Object.entries(provs).map(([name, p]) => `<tr>
        <td>${name}</td><td class="num">${p.requests ?? 0}</td>
        <td class="num">${p.cache_hits ?? 0}</td>
        <td class="num ${p.errors ? "neg" : ""}">${p.errors ?? 0}</td>
        <td class="num">${p.latency ? p.latency.avg_ms + " / " + p.latency.p95_ms : "—"}</td></tr>`).join("");
      const provTable = `<b>Providers</b> <span class="muted">requests · cache hits · errors · latency avg/p95 ms</span>
        <table style="margin:4px 0 16px"><thead><tr><th>Provider</th><th class="num">Req</th>
        <th class="num">Cache</th><th class="num">Err</th><th class="num">Latency</th></tr></thead>
        <tbody>${provRows || `<tr><td colspan="5" class="muted">no provider calls yet</td></tr>`}</tbody></table>`;

      // Funnel timings + scheduler activity.
      const funnelRows = ["tier1", "tier2", "tier3", "tier4"].map(tk => {
        const tm = (reg.timings || {})[`funnel.${tk}.ms`];
        const runs = (reg.counters || {})[`funnel.${tk}.runs`] || 0;
        return `<tr><td>${tk}</td><td class="num">${runs}</td>
          <td class="num">${tm ? tm.avg_ms : "—"}</td><td class="num">${tm ? tm.p95_ms : "—"}</td></tr>`;
      }).join("");
      const funnelTable = `<b>Funnel timings</b> <span class="muted">runs · avg/p95 ms</span>
        <table style="margin:4px 0 16px"><thead><tr><th>Tier</th><th class="num">Runs</th>
        <th class="num">Avg ms</th><th class="num">p95 ms</th></tr></thead><tbody>${funnelRows}</tbody></table>`;

      const evRows = Object.entries(ev.by_type || {}).map(([k, v]) =>
        `<tr><td>${k}</td><td class="num">${v}</td></tr>`).join("");
      const evTable = `<b>Event volume</b>
        <table style="margin-top:4px"><thead><tr><th>Type</th><th class="num">Count</th></tr></thead>
        <tbody>${evRows || `<tr><td colspan="2" class="muted">none</td></tr>`}</tbody></table>`;

      return badges + tierRow + provTable + funnelTable + evTable;
    }

    // ---------------- Short-Duration Trading ----------------
    const REGIME_LABEL = {
      bull_trend: "Bull trend", bear_trend: "Bear trend", range_bound: "Range-bound",
      high_vol_trend: "High-vol trend", high_vol_chop: "High-vol chop",
      low_vol_compression: "Low-vol compression", news_driven: "News-driven",
      macro_event_driven: "Macro-event-driven", unstable: "Unstable / restricted",
    };
    function regimeBanner(r) {
      const cls = !r.allow_new_trades ? "regime-stop" : r.reduce_size ? "regime-warn" : "regime-ok";
      const gate = !r.allow_new_trades
        ? `<span class="badge warn">NEW TRADES BLOCKED</span>`
        : r.reduce_size ? `<span class="badge" style="color:#d97706">REDUCE SIZE</span>`
        : `<span class="badge" style="color:var(--green)">trading allowed</span>`;
      const nxt = r.next_event_name
        ? `Next risk event: <strong>${r.next_event_name}</strong> in <span class="countdown">${r.next_event_minutes == null ? "—" : Math.round(r.next_event_minutes) + "m"}</span>`
        : "No scheduled macro event ahead.";
      const facts = (r.factors || []).map(f =>
        `<span class="factor ${f.supports ? "" : "against"}">${f.name}: ${f.value}</span>`).join("");
      const idx = [["SPY", r.spy_trend_pct], ["QQQ", r.qqq_trend_pct], ["IWM", r.iwm_trend_pct]]
        .map(([s, v]) => `${s} ${v == null ? "—" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%"}`).join(" · ");
      return `<div class="banner ${cls}">
        <h2>${REGIME_LABEL[r.regime] || r.regime} ${gate}</h2>
        <div class="sub">Confidence ${(r.confidence * 100).toFixed(0)}% · ${idx}
          · ${r.internals_breadth_score != null
              ? "internals " + (r.internals_breadth_score * 100).toFixed(0) + "% <span class=\"pos\">real</span>"
              : "participation " + (r.watchlist_participation_pct == null ? "—" : (r.watchlist_participation_pct * 100).toFixed(0) + "%") + " <span class=\"proxy-note\">proxy</span>"}
          · vol ${r.vol_reading == null ? "—" : (r.vol_reading * 100).toFixed(0) + "%"}</div>
        <div style="margin-top:6px">${nxt}</div>
        <div class="factors">${facts}</div>
        ${r.notes ? `<div class="proxy-note" style="margin-top:6px">${r.notes}</div>` : ""}
      </div>`;
    }

    const SD_BUCKET_LABEL = {
      0: "🟢 Ready to trade", 1: "🟡 Armed — entry blocked", 2: "⚪ Watchlist",
      3: "🔵 In flight", 4: "▫️ Evaluating", 5: "🔴 Rejected / closed",
    };
    function sdBucket(c) {
      const armed = c.state === "armed" || c.state === "triggered";
      if (armed) return c.entry_allowed ? 0 : 1;
      if (c.state === "watchlist") return 2;
      if (["proposed", "approved", "open", "managing"].includes(c.state)) return 3;
      if (["rejected", "expired", "closed"].includes(c.state)) return 5;
      return 4;
    }
    function sdRow(c, rank) {
      const rr = c.reward_to_risk == null ? "—" : c.reward_to_risk.toFixed(2);
      const risk = c.max_risk_usd == null ? "—" : "$" + Math.round(c.max_risk_usd);
      const entry = c.entry_allowed
        ? '<span class="pos">ALLOWED</span>' : '<span class="neg">BLOCKED</span>';
      const why = (c.reject_reasons && c.reject_reasons.length)
        ? `<div class="muted" style="font-size:11px">${c.reject_reasons.slice(0, 3).join(", ")}</div>` : "";
      const acts = sdBucket(c) === 5 ? "" :
        `<button class="ghost" data-act="sd-arm" data-id="${c.id}">Arm</button>
         <button class="ghost" data-act="sd-reject" data-id="${c.id}">Reject</button>`;
      const rrisk = c.thesis && c.thesis.reversal_risk;
      const rrBadge = rrisk === "high" ? ' <span class="neg" title="High reversal risk — see thesis">⚠</span>'
        : rrisk === "elevated" ? ' <span class="warn" title="Elevated reversal risk — see thesis">⚠</span>' : "";
      return `<tr class="clickable" data-cid="${c.id}">
        <td class="rank">${rank == null ? "" : rank}</td>
        <td><strong>${c.symbol}</strong></td>
        <td><span class="pill">${c.dte_category}</span></td>
        <td>${c.direction}${rrBadge}</td>
        <td>${c.strategy || "—"}${why}</td>
        <td><span class="pill">${c.state}</span></td>
        <td class="num"><strong>${(c.score * 100).toFixed(0)}</strong></td>
        <td class="num">${rr}</td>
        <td class="num">${risk}</td>
        <td>${entry}</td>
        <td class="row-actions">${acts}</td>
      </tr>`;
    }

    async function renderSdDetail(cid) {
      const d = await api("GET", `/short-duration/candidates/${cid}`);
      const c = d.candidate, sc = c.scorecard;
      const canPaper = c.trade_plan != null && !["open","closed","rejected","expired"].includes(c.state);
      let prop = null;
      try { prop = (await api("GET","/short-duration/proposals")).find(p => p.scan_id === "sd:"+c.id) || null; } catch(e){}
      const propBtns = (() => {
        if (prop && prop.status === "pending_approval")
          return `<button data-act="sd-approve" data-pid="${prop.id}">Approve</button>
                  <button class="ghost" data-act="sd-prop-reject" data-pid="${prop.id}">Reject</button>`;
        if (prop && prop.status === "approved")
          return `<button data-act="sd-execute" data-pid="${prop.id}">Execute (guarded)</button>`;
        if (!prop && canPaper && c.trade_plan != null)
          return `<button class="ghost" data-act="sd-propose" data-id="${c.id}">Propose (live · gated)</button>`;
        return "";
      })();
      const back = `<button class="ghost" data-act="sd-back">← Back</button>
        ${canPaper ? `<button data-act="sd-paper" data-id="${c.id}">Open paper trade</button>` : ""}
        ${propBtns}
        ${prop ? `<span class="badge">proposal ${prop.status}</span>` : ""}`;
      const gateCls = c.entry_allowed === false ? "regime-stop" : "regime-ok";
      const gate = c.entry_allowed == null ? "" :
        `<div class="banner ${gateCls}" style="margin-top:8px"><b>Entry gates:</b>
         ${c.entry_allowed ? '<span class="pos">CLEAR</span>' : '<span class="warn">BLOCKED</span>'}
         <span class="muted">${(c.entry_notes||[]).join(" · ")}</span>
         ${(c.reject_reasons||[]).length ? `<div class="warn" style="margin-top:4px">rejected: ${c.reject_reasons.join(", ")}</div>` : ""}</div>`;
      const rec = c.contract || {};
      const legRows = (rec.legs||[]).map(l =>
        `<tr><td>${l.action.replace(/_/g," ")}</td><td><strong>${l.strike}${l.option_type[0].toUpperCase()}</strong></td>
         <td>${l.expiration}</td><td class="num">${l.quantity}</td></tr>`).join("");
      const contract = `<div class="card" style="margin-top:10px"><h3>Contract & risk</h3>
        <div class="kv">
          <div>Structure</div><div>${rec.description||"—"}</div>
          <div>Max loss / profit</div><div>${c.max_risk_usd==null?"—":"$"+c.max_risk_usd} / ${rec.max_profit_usd==null?"uncapped":"$"+rec.max_profit_usd}</div>
          <div>Reward : risk</div><div>${c.reward_to_risk==null?"—":c.reward_to_risk+" : 1"}</div>
          <div>Breakeven</div><div>${(rec.breakevens||[]).length?rec.breakevens.join(" / "):"—"}</div>
          <div>Est. net / share</div><div>${rec.est_fill_net==null?"—":"$"+rec.est_fill_net}</div>
        </div>
        ${legRows?`<table style="margin-top:8px"><thead><tr><th>Leg</th><th>Contract</th><th>Expiry</th><th class="num">Qty</th></tr></thead><tbody>${legRows}</tbody></table>`:`<div class="muted" style="margin-top:6px">${rec.liquidity_note||"No tradeable contract."}</div>`}
        <div class="proxy-note" style="margin-top:6px">Defined-risk only, sized to the per-trade cap. No order is placed.</div></div>`;
      // Structure-aware exit plan (Phase 3) surfaced for the human managing the trade.
      const ep = c.exit_plan;
      const pxOf = v => v == null ? "" : ` <span class="muted">@ ${v}</span>`;
      const pts = ep && ep.profit_targets && ep.profit_targets.length
        ? ep.profit_targets.map(t => `<div><strong>${t.label}</strong> ${t.premium_net==null?"":"net "+t.premium_net} <span class="muted">${t.note||t.trigger||""}</span></div>`).join("")
        : '<div class="muted">—</div>';
      const exitPlan = !ep ? "" : `<div class="card" style="margin-top:10px"><h3>Exit plan <span class="muted" style="font-size:12px">structure + clock</span></h3>
        <div class="kv">
          <div>Primary invalidation</div><div>${ep.primary_invalidation}${pxOf(ep.primary_invalidation_price)}</div>
          <div>Secondary</div><div>${ep.secondary_invalidation||"—"}${pxOf(ep.secondary_invalidation_price)}</div>
          <div>Premium backstop</div><div>${ep.premium_stop_net==null?"—":"net "+ep.premium_stop_net} <span class="muted">${ep.premium_stop_note||""}</span></div>
          <div>Profit targets</div><div>${pts}</div>
          <div>Time stop</div><div>${ep.time_stop||"—"}</div>
          <div>Momentum stop</div><div>${ep.momentum_stop||"—"}</div>
          <div>EOD / expiration</div><div>${ep.eod_action||"—"}<br><span class="muted">${ep.expiration_action||""}</span></div>
        </div>
        <div class="proxy-note" style="margin-top:6px">${ep.rationale||""}</div></div>`;
      // Strategy signal diagnostics (Phase 6): ORB buffer/extension, VWAP-quality, etc.
      const sm = c.signal_metadata || {};
      const smKeys = Object.keys(sm);
      const signalMeta = !smKeys.length ? "" : `<div class="card" style="margin-top:10px"><h3>Signal diagnostics</h3>
        <div class="kv">${smKeys.map(k => `<div>${k.replace(/_/g," ")}</div><div>${typeof sm[k]==="number"?(+sm[k]).toFixed(4).replace(/\.?0+$/,""):sm[k]}</div>`).join("")}</div></div>`;
      // Directional thesis — the "read before you act" box (informational). Placed
      // right under the banner so a counter-trend day (e.g. a bearish call on a green
      // day) is reconciled before you look at the contract.
      const th = c.thesis;
      const riskCls = th && th.reversal_risk === "high" ? "regime-stop"
        : th && th.reversal_risk === "elevated" ? "regime-warn" : "regime-ok";
      const thesisCard = !th ? "" : `<div class="card" style="margin-top:10px"><h3>Directional thesis
        <span class="muted" style="font-size:12px">read before you act</span></h3>
        <div style="font-size:15px"><b>${th.headline}</b></div>
        ${th.todays_context ? `<div style="margin-top:6px">${th.todays_context}</div>` : ""}
        ${(th.drivers||[]).length ? `<ul style="margin:8px 0 0 18px">${th.drivers.map(x=>`<li>${x}</li>`).join("")}</ul>` : ""}
        ${th.invalidation ? `<div class="muted" style="margin-top:6px"><b>Invalidation:</b> ${th.invalidation}${th.distance_to_invalidation_pct!=null?` — <b>${th.distance_to_invalidation_pct}%</b> away`:""}</div>` : ""}
        <div class="banner ${riskCls}" style="margin-top:8px"><b>Reversal risk: ${th.reversal_risk.toUpperCase()}</b>
          ${(th.reversal_risk_reasons||[]).length ? `<div class="muted" style="margin-top:4px">${th.reversal_risk_reasons.join(" ")}</div>` : ' <span class="muted">— none flagged</span>'}</div>
        <div class="proxy-note" style="margin-top:6px">Informational only — this never changes the score or blocks entry.</div></div>`;
      const head = `<div class="banner" style="margin-top:10px"><h2>${c.symbol}
        <span class="muted" style="font-size:14px">${c.strategy || ""} · ${c.direction} · ${c.dte_category}</span></h2>
        <div class="sub">State <span class="pill">${c.state}</span> · score <strong>${(c.score*100).toFixed(0)}</strong>/100
          · confidence ${(c.confidence*100).toFixed(0)}% · data quality ${c.data_quality_score==null?"—":(c.data_quality_score*100).toFixed(0)+"%"}
          ${c.freshness ? "· quote " + (c.freshness.ok ? '<span class="pos">' : '<span class="neg">') + (c.freshness.quote_age_s==null?"n/a":c.freshness.quote_age_s+"s") + "</span> <span class=\"muted\">(≤" + c.freshness.threshold_s + "s " + c.freshness.use_case + ")</span>" : ""}

        <div class="kv"><div>Total</div><div>${(c.news_score.total*100).toFixed(0)}% ${c.news_score.is_duplicate?'<span class="warn">(duplicate)</span>':""}</div>
        <div>Breakdown</div><div class="muted">${c.news_score.explanation}</div></div>` : "";
      const trs = (d.transitions||[]).map(t =>
        `<tr><td>${t.from_state||"—"} → <strong>${t.to_state}</strong></td><td>${t.trigger}</td>
         <td>${t.actor}</td><td class="muted">${t.reason}</td></tr>`).join("");
      const trail = `<h3 style="margin-top:14px">State transitions</h3>
        <table><thead><tr><th>Transition</th><th>Trigger</th><th>Actor</th><th>Reason</th></tr></thead><tbody>${trs}</tbody></table>`;
      return back + head + `<div class="card">${factors}${comp}${news}${trail}</div>`;

    function sdCandTable(cands) {
      if (!cands || !cands.length)
        return `<div class="empty">No setups detected. Run a scan.</div>`;
      const COLS = 11;
      const head = `<thead><tr><th>#</th><th>Sym</th><th>DTE</th><th>Dir</th><th>Strategy</th>
        <th>State</th><th class="num">Score</th><th class="num">R:R</th><th class="num">Risk</th>
        <th>Entry</th><th></th></tr></thead>`;
      // Sort by actionability (mirrors the backend) so grouping is correct even
      // for the combined 0DTE+1-5DTE view, which concatenates two ranked lists.
      const sorted = [...cands].sort((a, b) =>
        sdBucket(a) - sdBucket(b) ||
        (b.score || 0) - (a.score || 0) ||
        (b.reward_to_risk || 0) - (a.reward_to_risk || 0));
      const live = sorted.filter(c => sdBucket(c) !== 5);
      const dead = sorted.filter(c => sdBucket(c) === 5);
      let body = "", lastB = null, rank = 0;
      live.forEach(c => {
        const b = sdBucket(c);
        if (b !== lastB) { body += `<tr class="bucket"><td colspan="${COLS}">${SD_BUCKET_LABEL[b]}</td></tr>`; lastB = b; }
        body += sdRow(c, ++rank);
      });
      if (!body) body = `<tr><td colspan="${COLS}" class="muted">No actionable setups — see rejected below.</td></tr>`;
      let out = `<table>${head}<tbody>${body}</tbody></table>`;
      if (dead.length) {
        const drows = dead.map(c => sdRow(c, null)).join("");
        out += `<details style="margin-top:8px"><summary class="muted" style="cursor:pointer;padding:6px 0">
          Rejected / closed (${dead.length}) — expand</summary>
          <table>${head}<tbody>${drows}</tbody></table></details>`;
      }
      return out;
    }

      let catCard = "";
      const syms = [...new Set(news.map(n => n.symbol).filter(Boolean))].slice(0, 6);

        const groups = await Promise.all(syms.map(s => api("GET", `/short-duration/news/events/${s}`).catch(() => [])));

        ${st("Prev close", q.prev_close == null ? "—" : fmt(q.prev_close))}
        ${st("Next earnings", r.earnings ? r.earnings.report_date : "—")}
        ${st("Sector", r.fundamentals && r.fundamentals.sector ? r.fundamentals.sector : "—")}
      </div></div>`;
      const f = r.flow || {};
      const flowTop = (f.top || []).map(a => `<tr><td>${(a.option_type || "").toUpperCase()}</td>
        <td class="num">${a.strike}</td><td>${a.expiration || "—"}</td>
        <td class="num">$${fmt(a.premium, 0)}</td>
        <td>${a.is_sweep ? '<span class="warn">SWEEP</span>' : "block"}</td>
        <td class="num ${a.sentiment > 0 ? "pos" : a.sentiment < 0 ? "neg" : ""}">${a.sentiment == null ? "—" : fmt(a.sentiment)}</td></tr>`).join("");
      const flowCard = `<div class="card"><h3>Options flow${f.alerts ? ` — ${f.calls}c / ${f.puts}p · $${fmt(f.total_premium_usd, 0)} · sentiment ${f.net_sentiment == null ? "—" : fmt(f.net_sentiment)}` : ""}</h3>
        ${f.alerts ? `<table><thead><tr><th>Type</th><th class="num">Strike</th><th>Exp</th><th class="num">Premium</th><th>Kind</th><th class="num">Sent</th></tr></thead><tbody>${flowTop}</tbody></table>` : '<div class="muted">No unusual flow.</div>'}</div>`;
      const newsRows = (r.news || []).slice(0, 10).map(n => `<tr><td>${n.headline}</td><td class="muted">${n.source || ""}</td></tr>`).join("");
      const newsCard = `<div class="card"><h3>News</h3>${newsRows ? `<table><tbody>${newsRows}</tbody></table>` : '<div class="muted">No recent news.</div>'}</div>`;
      const catRows = (r.catalysts || []).map(c => `<tr><td>${c.event_type || ""}</td><td>${c.event_date || ""}</td><td class="muted">${c.description || ""}</td></tr>`).join("");
      const earnRow = r.earnings ? `<tr><td>earnings</td><td>${r.earnings.report_date}</td><td class="muted">${r.earnings.time_of_day || ""}</td></tr>` : "";
      const catCard = `<div class="card"><h3>Catalysts</h3>${(earnRow || catRows) ? `<table><tbody>${earnRow}${catRows}</tbody></table>` : '<div class="muted">None upcoming.</div>'}</div>`;
      const swingRows = (r.swing || []).map(c => `<tr>
        <td><strong>${c.symbol}</strong></td><td>${c.direction}</td>
        <td class="num">${c.composite_score == null ? "—" : (c.composite_score * 100).toFixed(0)}</td>
        <td>${c.trade_plan ? stratLabel(c.trade_plan.strategy) : "—"}</td>
        <td class="num">${c.trade_plan && c.trade_plan.risk ? "$" + fmt(c.trade_plan.risk.max_loss_usd, 0) : "—"}</td>
        <td><span class="pill">${c.status}</span></td></tr>`).join("");
      const swingCard = `<div class="card"><h3>Swing plays (core)</h3>${swingRows ? `<table><thead><tr><th>Sym</th><th>Dir</th><th class="num">Score</th><th>Structure</th><th class="num">Risk</th><th>Status</th></tr></thead><tbody>${swingRows}</tbody></table>` : '<div class="muted">No swing setup detected.</div>'}</div>`;
      const sdAll = [...(r.zero_dte || []), ...(r.one_five_dte || [])];
      const sdCard = `<div class="card"><h3>Short-duration plays (0DTE + 1–5DTE)</h3>${sdCandTable(sdAll)}</div>`;
      const errNote = Object.keys(r.errors || {}).length ? `<div class="muted" style="margin:6px 0">Some sections unavailable: ${Object.keys(r.errors).join(", ")}.</div>` : "";
      return `<div style="margin-bottom:10px"><button class="ghost" data-act="search-close">← Back</button>
        <button class="ghost" data-act="search-refresh" data-sym="${r.symbol}">Refresh</button>
        <span class="muted">Live research · ${new Date().toLocaleTimeString()} · setups from the engines, not the news</span></div>
        ${head}${errNote}
        <div style="height:14px"></div>${sdCard}
        <div style="height:14px"></div><div class="autogrid">${swingCard}${flowCard}${newsCard}${catCard}</div>`;
    }

    async function render() {
      showErr(null);
      try {
        if (state.search) { $("#view").innerHTML = await renderSymbolReport(state.search); return; }
        if (state.section === "short") { $("#view").innerHTML = await renderSd(); return; }
        if (state.tab === "candidates") $("#view").innerHTML = renderCandidates();
        else if (state.tab === "positions") $("#view").innerHTML = await renderPositions();
        else if (state.tab === "proposals") $("#view").innerHTML = await renderProposals();
        else if (state.tab === "calibration") $("#view").innerHTML = await renderCalibration();
        else if (state.tab === "ops") $("#view").innerHTML = await renderOps();
        else $("#view").innerHTML = await renderPaper();
      } catch (e) { showErr(e); }
    }

    function switchSection(section) {
      state.section = section; state.sdDetail = null; state.search = null;
      document.querySelectorAll(".sections button").forEach(x =>
        x.classList.toggle("active", x.dataset.section === section));
      const short = section === "short";
      $("#coreControls").hidden = short;
      $("#coreTabs").hidden = short;
      $("#sdTabs").hidden = !short;
      manageOpsRefresh(); render();
    }

    // Symbol search (works from any section)
    function doSearch() {
      const sym = ($("#symSearch").value || "").trim().toUpperCase();
      if (!sym) { state.search = null; render(); return; }
      state.search = sym; render();
    }
    $("#symSearchBtn").addEventListener("click", doSearch);
    $("#symSearch").addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

    // Event delegation
    $("#scan").addEventListener("click", runScan);
    document.querySelectorAll(".sections button").forEach(b =>
      b.addEventListener("click", () => switchSection(b.dataset.section)));
    document.querySelectorAll("#coreTabs button").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll("#coreTabs button").forEach(x => x.classList.remove("active"));
        b.classList.add("active"); state.tab = b.dataset.tab; state.search = null; manageOpsRefresh(); render();
      }));
    document.querySelectorAll("#sdTabs button").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll("#sdTabs button").forEach(x => x.classList.remove("active"));
        b.classList.add("active"); state.sdTab = b.dataset.sdtab; state.sdDetail = null; state.search = null;
        manageOpsRefresh(); render();
      }));

    $("#view").addEventListener("click", async (e) => {
      const actBtn = e.target.closest("button[data-act]");
      if (actBtn) {
        e.stopPropagation();
        const act = actBtn.dataset.act;
        try {
          if (act === "propose") {
            const p = await api("POST", "/proposals", { scan_id: state.scanId, symbol: actBtn.dataset.sym });
            alert("Proposal " + p.id + " created (" + p.status + ")");
          } else if (act === "paper") {
            const t = await api("POST", "/paper", { scan_id: state.scanId, symbol: actBtn.dataset.sym });
            alert("Paper trade " + t.id + " opened");
          } else if (act === "approve") {
            await api("POST", `/proposals/${actBtn.dataset.p}/approve`, { approver: "dashboard" }); render();
          } else if (act === "reject") {
            await api("POST", `/proposals/${actBtn.dataset.p}/reject`, { note: "via dashboard" }); render();
          } else if (act === "execute") {
            const d = await api("POST", `/proposals/${actBtn.dataset.p}/execute`);
            alert("Execution: authorized=" + d.authorized + " — " + d.reason);
          } else if (act === "resolve") {
            const d = await api("POST", "/outcomes/resolve?min_age_days=0");
            alert("Resolved " + d.resolved + " decision(s) against current prices.");
            render();
          } else if (act === "pos-refresh") {
            render();
          } else if (act === "pos-sync") {
            actBtn.disabled = true; actBtn.textContent = "Syncing…";
            try {
              const d = await api("POST", "/positions/sync");
              alert("Sync: " + d.message);
            } finally { render(); }
          } else if (act === "sd-scan-0dte" || act === "sd-scan-1-5dte") {
            const cat = act === "sd-scan-0dte" ? "0dte" : "1-5dte";
            actBtn.disabled = true; actBtn.textContent = "Scanning…";
            try {
              const d = await api("POST", `/short-duration/scans/${cat}`);
              alert(`Created ${d.created} context candidate(s). ${d.note}`);
            } finally { render(); }
          } else if (act === "sd-arm") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/arm`); render();
          } else if (act === "sd-reject") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/reject`); render();
          } else if (act === "search-close") {
            state.search = null; render();
          } else if (act === "search-refresh") {
            render();
          } else if (act === "sd-back") {
            state.sdDetail = null; render();
          } else if (act === "sd-paper") {
            actBtn.disabled = true; actBtn.textContent = "Opening…";
            try { await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/paper`); }
            finally { render(); }
          } else if (act === "sd-monitor") {
            actBtn.disabled = true; actBtn.textContent = "Monitoring…";
            try { const r = await api("POST", "/short-duration/positions/monitor");
              alert(`Marked ${r.length} position(s).`); } finally { render(); }
          } else if (act === "sd-propose") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/propose`); render();
          } else if (act === "sd-approve") {
            await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/approve`, { approver: "dashboard" }); render();
          } else if (act === "sd-prop-reject") {
            await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/reject`, { note: "via dashboard" }); render();
          } else if (act === "sd-execute") {
            const dsn = await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/execute`);
            alert(`Execution guard: authorized=${dsn.authorized} — ${dsn.reason}`); render();
          }
        } catch (err) { showErr(err); }
        return;
      }
      const row = e.target.closest("tr.clickable");
      if (row && state.section === "core" && state.tab === "candidates") {
        const sym = row.dataset.sym;
        const c = state.candidates.find(x => x.symbol === sym);
        const d = $("#d-" + sym);
        if (d.hidden) { d.innerHTML = detailRow(c).replace(/^<tr[^>]*>|<\/tr>$/g, ""); d.hidden = false; }
        else d.hidden = true;
      }
      const posRow = e.target.closest("tr.pos-clickable");
      if (posRow && state.tab === "positions") {
        const sym = posRow.dataset.sym;
        const d = $("#pd-" + sym);
        if (d) {
          d.hidden = !d.hidden;
          if (d.hidden) state.expandedPos.delete(sym); else state.expandedPos.add(sym);
        }
      }
      const sdRow = e.target.closest("tr[data-cid]");
      if (sdRow && state.section === "short") {
        state.sdDetail = sdRow.dataset.cid; render();
      }
    });

    loadConfig();
  </script>
</body>
</html>
