        <div style="height:14px"></div>${sdCard}
        <div style="height:14px"></div><div class="autogrid">${swingCard}${flowCard}${newsCard}${catCard}</div>`;
    }

    // --- Trading history: calendar + performance --------------------------------
    const usd = (v, d = 2) => v === null || v === undefined ? "—"
      : (v < 0 ? "-$" : "+$") + Math.abs(v).toFixed(d);
    const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

    function equitySvg(curve) {
      if (curve.length < 2) return `<div class="empty">Need at least two trading days for a curve.</div>`;
      const w = 560, h = 190, pl = 52, pr = 12, pt = 12, pb = 24;
      const ys = curve.map(p => p[1]);
      let lo = Math.min(0, ...ys), hi = Math.max(0, ...ys);
      if (hi - lo < 1) hi = lo + 1;
      const X = i => pl + (w - pl - pr) * i / (curve.length - 1);
      const Y = v => pt + (h - pt - pb) * (1 - (v - lo) / (hi - lo));
      const path = curve.map((p, i) => (i ? "L" : "M") + X(i).toFixed(1) + " " + Y(p[1]).toFixed(1)).join(" ");
      const grid = [lo, (lo + hi) / 2, hi].map(v =>
        `<line x1="${pl}" x2="${w - pr}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
         <text x="${pl - 6}" y="${(Y(v) + 4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">${v < 0 ? "-" : ""}$${Math.abs(v).toFixed(0)}</text>`).join("");
      const zero = (lo < 0 && hi > 0)
        ? `<line x1="${pl}" x2="${w - pr}" y1="${Y(0).toFixed(1)}" y2="${Y(0).toFixed(1)}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>` : "";
      const last = curve[curve.length - 1];
      const hover = curve.map((p, i) =>
        `<circle cx="${X(i).toFixed(1)}" cy="${Y(p[1]).toFixed(1)}" r="10" fill="transparent"><title>${p[0]}: ${usd(p[1])} cumulative</title></circle>`).join("");
      return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px" role="img" aria-label="Cumulative realized P&amp;L">
        ${grid}${zero}
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${X(curve.length - 1).toFixed(1)}" cy="${Y(last[1]).toFixed(1)}" r="3.5" fill="var(--accent)"/>
        <text x="${pl}" y="${h - 6}" font-size="10" fill="var(--muted)">${curve[0][0]}</text>
        <text x="${w - pr}" y="${h - 6}" text-anchor="end" font-size="10" fill="var(--muted)">${last[0]}</text>
        ${hover}</svg>`;
    }

    function monthlySvg(byMonth) {
      if (!byMonth.length) return `<div class="empty">No closed months yet.</div>`;
      const w = 560, h = 200, pl = 52, pr = 12, pt = 20, pb = 30;
      const vals = byMonth.map(m => m[1]);
      let hi = Math.max(0, ...vals), lo = Math.min(0, ...vals);
      if (hi - lo < 1) hi = lo + 1;
      const Y = v => pt + (h - pt - pb) * (1 - (v - lo) / (hi - lo));
      const span = (w - pl - pr) / byMonth.length;
      const bw = Math.max(6, Math.min(46, span - 4));
      const bars = byMonth.map((m, i) => {
        const [label, net, n] = m;
        const x = pl + span * i + (span - bw) / 2;
        const y0 = Y(0), y1 = Y(net);
        const top = Math.min(y0, y1), bh = Math.max(1.5, Math.abs(y0 - y1));
        const color = net < 0 ? "var(--red)" : "var(--green)";
        // Label below a negative bar; if that runs out of plot, hop above the baseline.
        let vy = net < 0 ? top + bh + 12 : Math.max(pt - 2, top - 5);
        if (net < 0 && vy > h - pb - 4) vy = top - 5;
        return `<rect x="${x.toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${color}"><title>${label}: ${usd(net)} across ${n} trade(s)</title></rect>
          <text x="${(x + bw / 2).toFixed(1)}" y="${vy.toFixed(1)}" text-anchor="middle" font-size="10" fill="var(--text)">${usd(net, 0)}</text>
          <text x="${(x + bw / 2).toFixed(1)}" y="${h - 8}" text-anchor="middle" font-size="10" fill="var(--muted)">${label.slice(2)}</text>`;
      }).join("");
      const zeroY = Y(0).toFixed(1);
      return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px" role="img" aria-label="Monthly realized P&amp;L">
        <line x1="${pl}" x2="${w - pr}" y1="${zeroY}" y2="${zeroY}" stroke="var(--border)" stroke-width="1"/>
        <text x="${pl - 6}" y="${+zeroY + 4}" text-anchor="end" font-size="10" fill="var(--muted)">$0</text>
        ${bars}</svg>`;
    }

    function histBreakdownCard(title, rows) {
      if (!rows.length) return "";
      const body = rows.slice().reverse().map(([k, n, net, wr]) =>
        `<tr><td>${esc(k)}</td><td class="num">${n}</td>
         <td class="num ${cls(net)}">${usd(net)}</td>
         <td class="num">${wr === null || wr === undefined ? "—" : (wr * 100).toFixed(0) + "%"}</td></tr>`).join("");
      return `<div class="card"><h3>${title}</h3>
        <table><thead><tr><th>${title.split(" ").pop()}</th><th class="num">Trades</th><th class="num">Net P&amp;L</th><th class="num">Win rate</th></tr></thead>
        <tbody>${body}</tbody></table></div>`;
    }

    function histCalendar(ym, byDay) {
      const [yr, mo] = ym.split("-").map(Number);
      const first = new Date(Date.UTC(yr, mo - 1, 1));
      const daysIn = new Date(Date.UTC(yr, mo, 0)).getUTCDate();
      const todayIso = new Date().toISOString().slice(0, 10);
      let cells = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => `<div class="dow">${d}</div>`).join("");
      for (let i = 0; i < first.getUTCDay(); i++) cells += `<div class="day blank"></div>`;
      let monthNet = 0, monthN = 0;
      for (let d = 1; d <= daysIn; d++) {
        const iso = `${ym}-${String(d).padStart(2, "0")}`;
        const info = byDay[iso];
        const classes = ["day"];
        if (iso === todayIso) classes.push("today");
        let body = "";
        if (info) {
          monthNet += info.pnl; monthN += info.n;
          classes.push("traded", info.pnl > 0 ? "win" : info.pnl < 0 ? "loss" : "");
          if (state.histDay === iso) classes.push("sel");
          body = `<div class="dpnl ${cls(info.pnl)}">${usd(info.pnl, Math.abs(info.pnl) >= 100 ? 0 : 2)}</div>
                  <div class="dct">${info.n} trade${info.n === 1 ? "" : "s"}</div>`;
        }
        cells += `<div class="${classes.join(" ").trim()}" ${info ? `data-histday="${iso}"` : ""}>
          <div class="dnum">${d}</div>${body}</div>`;
      }
      const mname = first.toLocaleDateString(undefined, { month: "long", year: "numeric", timeZone: "UTC" });
      return `<div class="cal-head">
          <button class="ghost" data-act="hist-prev">←</button>
          <span class="mname">${mname}</span>
          <button class="ghost" data-act="hist-next">→</button>
          <span class="muted">month: <span class="${cls(monthNet)}">${usd(monthNet)}</span> · ${monthN} trade(s) closed</span>
        </div><div class="cal">${cells}</div>
        <div class="muted" style="margin-top:6px;font-size:12px">Days show realized P&amp;L of trades closed that day — click a shaded day for details.</div>`;
    }

    function histDayDetail(trades) {
      if (!state.histDay) return `<div class="empty">Click a traded day on the calendar to see what closed.</div>`;
      const dayTrades = trades.filter(t => t.closed_date === state.histDay);
      if (!dayTrades.length) return `<div class="empty">No trades closed on ${state.histDay}.</div>`;
      const net = dayTrades.reduce((a, t) => a + (t.realized_pnl_usd || 0), 0);
      const rows = dayTrades.map(t => `<tr>
        <td><b>${esc(t.symbol)}</b> <span class="pill">${esc(t.strategy)}</span></td>
        <td class="num">${t.contracts}</td>
        <td class="num">${fmt(t.entry_net)} → ${fmt(t.exit_net)}</td>
        <td class="num ${cls(t.realized_pnl_usd)}">${usd(t.realized_pnl_usd)}</td>
        <td class="num ${cls(t.pnl_pct)}">${t.pnl_pct === null || t.pnl_pct === undefined ? "—" : (t.pnl_pct * 100).toFixed(1) + "%"}</td>
        <td class="num">${t.days_held ?? "—"}</td>
        <td>${esc(t.exit_reason || "—")}${t.exit_note ? ` <span class="muted">${esc(t.exit_note)}</span>` : ""}</td>
      </tr>`).join("");
      return `<div style="margin-bottom:8px"><b>${state.histDay}</b> — day net
          <span class="${cls(net)}">${usd(net)}</span> across ${dayTrades.length} trade(s)</div>
        <table><thead><tr><th>Trade</th><th class="num">Qty</th><th class="num">Entry → Exit</th>
          <th class="num">P&amp;L</th><th class="num">Return</th><th class="num">Days</th><th>Exit</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }

    async function renderHistory() {
      const src = state.histSource || "live";
      const d = await api("GET", "/positions/history/analytics?source=" + src);
      state.histData = d;
      const s = d.stats;
      if (!state.histMonth) state.histMonth = new Date().toISOString().slice(0, 7);
      const byDay = {};
      for (const t of d.trades) {
        if (!t.closed_date) continue;
        const b = byDay[t.closed_date] || (byDay[t.closed_date] = { pnl: 0, n: 0 });
        b.pnl += (t.realized_pnl_usd || 0); b.n++;
      }
      const srcBtn = (v, label) =>
        `<button class="ghost" data-act="hist-src" data-src="${v}" ${src === v ? 'style="border-color:var(--accent);color:var(--accent)"' : ""}>${label}</button>`;
      const filters = `<div class="controls">
        ${srcBtn("live", "Live trades")}${srcBtn("paper", "Paper")}${srcBtn("all", "All")}
        <span class="muted">${esc(d.note)}</span></div>`;
      if (!s.n) return filters + `<div class="empty">No closed ${src === "all" ? "" : src + " "}trades yet.
        Close a tracked position and it lands here.</div>`;
      const tile = (k, v, cl = "", sub = "") =>
        `<div class="tile"><div class="k">${k}</div><div class="v ${cl}">${v}</div>${sub ? `<div class="s">${sub}</div>` : ""}</div>`;
      const tiles = `<div class="tiles">
        ${tile("Net realized P&L", usd(s.net_pnl_usd), cls(s.net_pnl_usd), `${s.n} closed trade(s)`)}
        ${tile("Win rate", s.win_rate === null ? "—" : (s.win_rate * 100).toFixed(0) + "%", "", `${s.wins}W / ${s.losses}L${s.scratches ? ` / ${s.scratches} scratch` : ""}`)}
        ${tile("Expectancy / trade", usd(s.expectancy_usd), cls(s.expectancy_usd))}
        ${tile("Profit factor", s.profit_factor === null ? "—" : fmt(s.profit_factor), "", "gross win ÷ gross loss")}
        ${tile("Avg win / loss", `${usd(s.avg_win_usd, 0)} / ${usd(s.avg_loss_usd, 0)}`)}
        ${tile("Max drawdown", s.max_drawdown_usd === null ? "—" : "-$" + Math.abs(s.max_drawdown_usd).toFixed(0), s.max_drawdown_usd ? "neg" : "", "peak-to-trough, trade sequence")}
        ${tile("Best / worst day", s.best_day ? `${usd(s.best_day[1], 0)} / ${usd(s.worst_day[1], 0)}` : "—",
               "", s.best_day ? `${s.best_day[0]} / ${s.worst_day[0]}` : "")}
        ${tile("Avg days held", s.avg_days_held ?? "—")}</div>`;
      return filters + tiles + `
        <div class="grid2" style="margin-bottom:14px">
          <div class="card">${histCalendar(state.histMonth, byDay)}</div>
          <div class="card"><h3>Day detail</h3>${histDayDetail(d.trades)}</div>
        </div>
        <div class="grid2" style="margin-bottom:14px">
          <div class="card"><h3>Cumulative realized P&amp;L</h3>${equitySvg(s.equity_curve)}</div>
          <div class="card"><h3>Monthly P&amp;L</h3>${monthlySvg(s.by_month)}</div>
        </div>
        <div class="autogrid">
          ${histBreakdownCard("By symbol", s.by_symbol)}
          ${histBreakdownCard("By strategy", s.by_strategy)}
          ${histBreakdownCard("By exit reason", s.by_exit_reason)}
        </div>`;
    }

    async function render() {
      showErr(null);
      try {
        if (state.search) { $("#view").innerHTML = await renderSymbolReport(state.search); return; }
        if (state.section === "short") { $("#view").innerHTML = await renderSd(); return; }
        if (state.tab === "candidates") $("#view").innerHTML = renderCandidates();
        else if (state.tab === "positions") $("#view").innerHTML = await renderPositions();
        else if (state.tab === "proposals") $("#view").innerHTML = await renderProposals();
        else if (state.tab === "calibration") $("#view").innerHTML = await renderCalibration();
        else if (state.tab === "realmark") $("#view").innerHTML = await renderRealMark();
        else if (state.tab === "ops") $("#view").innerHTML = await renderOps();
        else if (state.tab === "history") $("#view").innerHTML = await renderHistory();
        else $("#view").innerHTML = await renderPaper();
      } catch (e) { showErr(e); }
    }

    function switchSection(section) {
      state.section = section; state.sdDetail = null; state.search = null;
      document.querySelectorAll(".sections button").forEach(x =>
        x.classList.toggle("active", x.dataset.section === section));
      const short = section === "short";
      $("#coreControls").hidden = short;
      $("#coreTabs").hidden = short;
      $("#sdTabs").hidden = !short;
      manageOpsRefresh(); render();
    }

    // Symbol search (works from any section)
    function doSearch() {
      const sym = ($("#symSearch").value || "").trim().toUpperCase();
      if (!sym) { state.search = null; render(); return; }
      state.search = sym; render();
    }
    $("#symSearchBtn").addEventListener("click", doSearch);
    $("#symSearch").addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(); });

    // Event delegation
    $("#scan").addEventListener("click", runScan);
    document.querySelectorAll(".sections button").forEach(b =>
      b.addEventListener("click", () => switchSection(b.dataset.section)));
    document.querySelectorAll("#coreTabs button").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll("#coreTabs button").forEach(x => x.classList.remove("active"));
        b.classList.add("active"); state.tab = b.dataset.tab; state.search = null; manageOpsRefresh(); render();
      }));
    document.querySelectorAll("#sdTabs button").forEach(b =>
      b.addEventListener("click", () => {
        document.querySelectorAll("#sdTabs button").forEach(x => x.classList.remove("active"));
        b.classList.add("active"); state.sdTab = b.dataset.sdtab; state.sdDetail = null; state.search = null;
        manageOpsRefresh(); render();
      }));

    $("#view").addEventListener("click", async (e) => {
      const actBtn = e.target.closest("button[data-act]");
      if (actBtn) {
        e.stopPropagation();
        const act = actBtn.dataset.act;
        try {
          if (act === "propose") {
            const p = await api("POST", "/proposals", { scan_id: state.scanId, symbol: actBtn.dataset.sym });
            alert("Proposal " + p.id + " created (" + p.status + ")");
          } else if (act === "paper") {
            const t = await api("POST", "/paper", { scan_id: state.scanId, symbol: actBtn.dataset.sym });
            alert("Paper trade " + t.id + " opened");
          } else if (act === "approve") {
            await api("POST", `/proposals/${actBtn.dataset.p}/approve`, { approver: "dashboard" }); render();
          } else if (act === "reject") {
            await api("POST", `/proposals/${actBtn.dataset.p}/reject`, { note: "via dashboard" }); render();
          } else if (act === "execute") {
            const d = await api("POST", `/proposals/${actBtn.dataset.p}/execute`);
            alert("Execution: authorized=" + d.authorized + " — " + d.reason);
          } else if (act === "resolve") {
            const d = await api("POST", "/outcomes/resolve?min_age_days=0");
            alert("Resolved " + d.resolved + " decision(s) against current prices.");
            render();
          } else if (act === "rm-run") {
            const mode = ($("#rmMode") && $("#rmMode").value) || "engine";
            const regime = ($("#rmRegime") && $("#rmRegime").value) || "2021-22";
            $("#view").innerHTML = `<div class="empty">Running real-mark validation (${mode}, ${regime})…</div>`;
            state.realmark = await api("GET", `/backtest/real-mark?mode=${mode}&regime=${regime}`);
            render();
          } else if (act === "pos-refresh") {
            render();
          } else if (act === "pos-add-show") {
            // Open + PAUSE the 5s auto-refresh so it can't wipe your entry.
            state.addPosOpen = true; manageOpsRefresh();
            const f = $("#posForm"); if (f) f.hidden = false;
          } else if (act === "pos-add-cancel") {
            state.addPosOpen = false; manageOpsRefresh();
            const f = $("#posForm"); if (f) f.hidden = true;
          } else if (act === "pos-delete") {
            if (!confirm("Permanently delete this position? This can't be undone.")) return;
            actBtn.disabled = true;
            try { await api("DELETE", `/positions/${actBtn.dataset.pid}`); }
            finally { render(); }
          } else if (act === "pos-quick") {
            const line = ($("#ap-quick").value || "").trim();
            const msg = $("#ap-quick-msg");
            if (!line) { if (msg) msg.textContent = "Type a trade line first."; return; }
            actBtn.disabled = true;
            try {
              const d = await api("POST", "/positions/quick-add", { line });
              if (msg) msg.innerHTML = `<span class="pos">✓ ${d.message}</span> <span class="muted">${d.parsed}</span>`;
              $("#ap-quick").value = "";
              state.addPosOpen = false; manageOpsRefresh();
              render();
            } catch (e) {
              if (msg) msg.innerHTML = `<span class="neg">${e.message || e}</span>`;
              actBtn.disabled = false;
            }
          } else if (act === "pos-add") {
            const sym = ($("#ap-symbol").value || "").trim().toUpperCase();
            if (!sym) { alert("Enter a symbol."); return; }
            const netRaw = $("#ap-net").value;
            const net = netRaw === "" ? null : parseFloat(netRaw);
            const mkLeg = (n) => {
              const strike = parseFloat($("#al" + n + "-strike").value);
              if (!strike) return null;
              const exp = $("#al" + n + "-exp").value;
              if (!exp) { alert("Leg " + n + " needs an expiration."); throw new Error("exp"); }
              const pxRaw = $("#al" + n + "-px").value;
              return {
                strike, option_type: $("#al" + n + "-type").value,
                is_long: $("#al" + n + "-side").value === "long",
                quantity: parseInt($("#al" + n + "-qty").value || "1", 10),
                entry_price_per_share: pxRaw === "" ? null : parseFloat(pxRaw),
                expiration: exp,
              };
            };
            let legs;
            try { legs = [mkLeg(1), mkLeg(2)].filter(Boolean); } catch (e) { return; }
            if (!legs.length) { alert("Leg 1 needs at least a strike and expiration."); return; }
            if (net == null && !legs[0].entry_price_per_share) {
              alert("Enter a net cost above, or a per-leg entry price for each leg."); return;
            }
            const opened = $("#ap-opened").value;
            const body = { symbol: sym, legs };
            if (net != null) body.net_debit_per_share = net;
            if (opened) body.opened_at = opened + "T14:30:00Z";
            actBtn.disabled = true;
            try {
              const d = await api("POST", "/positions/import", body);
              alert(d.message);
              state.addPosOpen = false;  // success: close the form + resume live refresh
            } finally { manageOpsRefresh(); render(); }
          } else if (act === "pos-close") {
            const pid = actBtn.dataset.pid;
            const exit = parseFloat(($("#cx-" + pid) || {}).value);
            if (isNaN(exit)) { alert("Enter the exit net per share."); return; }
            const reason = (($("#cr-" + pid) || {}).value || "").trim();
            actBtn.disabled = true;
            try {
              const d = await api("POST", `/positions/${pid}/close`, { exit_price_per_share: exit, reason });
              alert(`Closed ${d.symbol}: realized ${d.realized_pnl_usd >= 0 ? "+" : ""}$${d.realized_pnl_usd}.`);
            } finally { render(); }
          } else if (act === "sd-scan-0dte" || act === "sd-scan-1-5dte") {
            const cat = act === "sd-scan-0dte" ? "0dte" : "1-5dte";
            actBtn.disabled = true; actBtn.textContent = "Scanning…";
            try {
              const d = await api("POST", `/short-duration/scans/${cat}`);
              alert(`Created ${d.created} context candidate(s). ${d.note}`);
            } finally { render(); }
          } else if (act === "sd-arm") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/arm`); render();
          } else if (act === "sd-reject") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/reject`); render();
          } else if (act === "hist-prev" || act === "hist-next") {
            const [y, m] = (state.histMonth || new Date().toISOString().slice(0, 7)).split("-").map(Number);
            const shifted = new Date(Date.UTC(y, m - 1 + (act === "hist-next" ? 1 : -1), 1));
            state.histMonth = shifted.toISOString().slice(0, 7);
            state.histDay = null; render();
          } else if (act === "hist-src") {
            state.histSource = actBtn.dataset.src; state.histDay = null; render();
          } else if (act === "search-close") {
            state.search = null; render();
          } else if (act === "search-refresh") {
            render();
          } else if (act === "sd-back") {
            state.sdDetail = null; render();
          } else if (act === "sd-paper") {
            actBtn.disabled = true; actBtn.textContent = "Opening…";
            try { await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/paper`); }
            finally { render(); }
          } else if (act === "sd-monitor") {
            actBtn.disabled = true; actBtn.textContent = "Monitoring…";
            try { const r = await api("POST", "/short-duration/positions/monitor");
              alert(`Marked ${r.length} position(s).`); } finally { render(); }
          } else if (act === "sd-propose") {
            await api("POST", `/short-duration/candidates/${actBtn.dataset.id}/propose`); render();
          } else if (act === "sd-approve") {
            await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/approve`, { approver: "dashboard" }); render();
          } else if (act === "sd-prop-reject") {
            await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/reject`, { note: "via dashboard" }); render();
          } else if (act === "sd-execute") {
            const dsn = await api("POST", `/short-duration/proposals/${actBtn.dataset.pid}/execute`);
            alert(`Execution guard: authorized=${dsn.authorized} — ${dsn.reason}`); render();
          }
        } catch (err) { showErr(err); }
        return;
      }
      const dayCell = e.target.closest("[data-histday]");
      if (dayCell && state.tab === "history") {
        state.histDay = dayCell.dataset.histday === state.histDay ? null : dayCell.dataset.histday;
        render(); return;
      }
      const row = e.target.closest("tr.clickable");
      if (row && state.section === "core" && state.tab === "candidates") {
        const sym = row.dataset.sym;
        const c = state.candidates.find(x => x.symbol === sym);
        const d = $("#d-" + sym);
        if (d.hidden) { d.innerHTML = detailRow(c).replace(/^<tr[^>]*>|<\/tr>$/g, ""); d.hidden = false; }
        else d.hidden = true;
      }
      const posRow = e.target.closest("tr.pos-clickable");
      if (posRow && state.tab === "positions") {
        const pid = posRow.dataset.pid;
        const d = $("#pd-" + pid);
        if (d) {
          d.hidden = !d.hidden;
          if (d.hidden) state.expandedPos.delete(pid); else state.expandedPos.add(pid);
        }
      }
      const sdRow = e.target.closest("tr[data-cid]");
      if (sdRow && state.section === "short") {
        state.sdDetail = sdRow.dataset.cid; render();
      }
    });

    loadConfig();
  </script>
</body>
</html>
