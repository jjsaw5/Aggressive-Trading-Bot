# Two processes share one image:
#   api        — FastAPI + dashboard on :8000  (http://localhost:8000/dashboard)
#   scheduler  — the session-aware tiered funnel (runs when TIERING_ENABLED=true)
#
# Durable storage is Turso (from .env); the response cache is in-process memory,
# so no Postgres/Redis is needed. Tables are ensured on startup (create_all),
# so there is no migration step. Secrets come from .env via env_file — never
# baked into the image (see .dockerignore).
#
# To pull live Robinhood positions from inside the container, set
# INSTALL_ROBINHOOD=1 in .env (or the shell) and rebuild:
#   docker compose up -d --build
# That installs the unofficial robin_stocks library into the image; also set
# PROVIDER_BROKERAGE=robinhood (+ RH creds) in .env. Default 0 keeps it out.
services:
  api:
    build:
      context: .
      args:
        INSTALL_ROBINHOOD: ${INSTALL_ROBINHOOD:-0}
    image: aggressive-trading-bot
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  scheduler:
    build:
      context: .
      args:
        INSTALL_ROBINHOOD: ${INSTALL_ROBINHOOD:-0}
    image: aggressive-trading-bot
    env_file: .env
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.run"]
    healthcheck:
      disable: true  # no HTTP port; the API healthcheck covers liveness
